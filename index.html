<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedido Mayorista</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#640505",
              "background-light": "#f8f5f5",
              "background-dark": "#221010",
              whatsapp: "#25D366",
            },
            fontFamily: { display: "Inter" },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col"
  >
    <header class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-primary/10 shadow-sm">
      <div class="flex items-center p-4 justify-between">
        <button
          id="btn-reset"
          class="text-primary flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors"
          title="Limpiar pedido"
        >
          <span class="material-symbols-outlined">restart_alt</span>
        </button>
        <h1
          class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center"
        >
          Pedido Mayorista
        </h1>
        <div class="flex w-10 items-center justify-end">
          <button
            id="btn-theme"
            class="text-primary flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors"
            title="Tema claro/oscuro"
          >
            <span class="material-symbols-outlined">dark_mode</span>
          </button>
        </div>
      </div>

      <div
        id="category-tabs"
        class="flex overflow-x-auto border-b border-slate-200 dark:border-slate-700 px-4 scrollbar-hide"
      ></div>

      <div class="px-4 py-3 space-y-2">
        <label class="flex flex-col min-w-40 h-11 w-full">
          <div
            class="flex w-full flex-1 items-stretch rounded-xl h-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus-within:border-primary transition-colors"
          >
            <div class="text-slate-400 flex items-center justify-center pl-4">
              <span class="material-symbols-outlined text-[20px]">search</span>
            </div>
            <input
              id="search-input"
              class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 px-3 text-sm font-normal"
              placeholder="Buscar productos..."
            />
          </div>
        </label>
        <input
          id="client-name"
          class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm px-3 py-2 focus:border-primary focus:ring-primary"
          placeholder="Nombre del cliente (opcional)"
        />
      </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-48">
      <div id="groups-container" class="px-4 py-2 space-y-4"></div>
      <p id="empty-state" class="px-4 text-sm text-slate-500 hidden">
        No encontramos productos con esa búsqueda.
      </p>
    </main>

    <div
      class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-700 p-4 space-y-3 z-50"
    >
      <div class="flex items-center justify-between px-2">
        <div>
          <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">
            Total Items
          </p>
          <p id="summary-items" class="text-lg font-bold">0 Productos</p>
        </div>
        <div class="text-right">
          <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">
            Total Estimado
          </p>
          <p id="summary-total" class="text-2xl font-black text-primary">$0.00</p>
        </div>
      </div>
      <button
        id="send-whatsapp"
        class="w-full bg-whatsapp hover:brightness-110 active:scale-[0.98] transition-all text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-whatsapp/20 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg
          class="size-6 fill-current"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.801 1.026 3.848 1.567 5.925 1.567h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"
          ></path>
        </svg>
        Enviar Pedido por WhatsApp
      </button>
      <p class="text-[11px] text-slate-500 text-center">
        Editá el número destino en <code>WHATSAPP_NUMBER</code> (app.js).
      </p>
    </div>

    <script src="./melamina_data.js"></script>
    <script src="./pino_data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
